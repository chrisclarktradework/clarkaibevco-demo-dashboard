<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>ClarkAI Beverage Co — Robot Fuel Operations Dashboard</title>
<style>
:root{color-scheme:light;
 --bg-deep:#F3EAD6;--bg-panel:#ffffff;--bg-surface:#E9DEC6;--border-lt:#D8C9A8;
 --text:#2D2015;--text-muted:#5C4A2E;--text-dim:#8A7856;--gold:#2E7FC4;--gold-br:#7A5E15;--cream:#16273c;
 --good:#3E7142;--good-s:#3E7142;--warn:#B07A1E;--warn-s:#9A6B12;--bad:#B33A1B;--bad-br:#A8331A;
 --jira:#1E6FE0;--jira-bg:rgba(38,132,255,0.12);--ss:#2E8B57;--ss-bg:rgba(46,139,87,0.12);}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg-deep);color:var(--text);font-family:'Helvetica Neue',Arial,sans-serif;font-size:13px}
a{color:var(--gold);text-decoration:none}a:hover{text-decoration:underline}
header.topbar{display:flex;align-items:center;gap:18px;padding:13px 20px;background:var(--bg-panel);border-bottom:2px solid var(--gold)}
.brand{display:flex;flex-direction:column;align-items:flex-start;gap:3px}
.brand .logo{height:46px;width:auto;display:block;border-radius:6px;box-shadow:0 1px 4px rgba(16,35,59,.18)}
.brand .name{font-family:Georgia,serif;font-size:23px;letter-spacing:.13em;color:var(--cream)}
.brand .tag{font-size:9px;letter-spacing:.3em;color:var(--gold)}
.title-block{flex:1}.title-block .title{font-family:Georgia,serif;font-size:16px;color:var(--cream)}
.title-block .sub{font-size:11px;color:var(--text-muted);margin-top:3px}
.pill{display:inline-flex;align-items:center;gap:8px;padding:6px 13px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid}
.pill .dot{width:9px;height:9px;border-radius:50%}
.pill.good{border-color:var(--good-s);color:var(--good);background:rgba(62,113,66,.15)}.pill.good .dot{background:var(--good)}
.pill.warn{border-color:var(--warn-s);color:var(--warn);background:rgba(184,134,11,.15)}.pill.warn .dot{background:var(--warn)}
.pill.bad{border-color:var(--bad);color:var(--bad-br);background:rgba(179,58,27,.15)}.pill.bad .dot{background:var(--bad-br)}
nav.tabs{display:flex;padding:0 14px;background:var(--bg-panel);border-bottom:1px solid var(--border-lt);overflow-x:auto}
nav.tabs button{background:none;border:none;color:var(--text-muted);padding:11px 14px;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap;font-family:inherit}
nav.tabs button.active{color:var(--gold-br);border-bottom-color:var(--gold);background:rgba(46,127,196,.08)}
main{padding:16px 20px 60px;max-width:1500px;margin:0 auto}
.pane{display:none}.pane.active{display:block}
.grid{display:grid;gap:13px}.g2{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(3,1fr)}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:1000px){.g3,.g4{grid-template-columns:repeat(2,1fr)}}
.panel{background:var(--bg-panel);border:1px solid var(--border-lt);border-radius:5px;padding:13px 15px;position:relative}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--gold);opacity:.5}
.panel.good::before{background:var(--good-s);opacity:1}.panel.warn::before{background:var(--warn-s);opacity:1}.panel.bad::before{background:var(--bad);opacity:1}
.panel h2{font-family:Georgia,serif;font-size:13px;letter-spacing:.15em;color:var(--gold);margin-bottom:3px;text-transform:uppercase;font-weight:normal}
.panel .sub{font-size:9.5px;letter-spacing:.13em;color:var(--text-dim);margin-bottom:11px;text-transform:uppercase}
.kpi{font-family:Georgia,serif;font-size:32px;color:var(--cream);line-height:1}.kpi.sm{font-size:24px}
.kpi-lbl{font-size:10px;letter-spacing:.11em;color:var(--text-dim);text-transform:uppercase;margin-top:6px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;font-size:9.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--text-dim);padding:6px 7px;border-bottom:1px solid var(--border-lt)}
td{padding:6px 7px;border-bottom:1px solid rgba(115,133,160,.4)}
.tag-rag{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700}
.rag-red{background:rgba(179,58,27,.22);color:var(--bad-br);border:1px solid var(--bad)}
.rag-amber{background:rgba(184,134,11,.2);color:var(--warn);border:1px solid var(--warn-s)}
.rag-green{background:rgba(62,113,66,.2);color:var(--good);border:1px solid var(--good-s)}
.chip{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600;margin-right:4px}
.chip.jira{background:var(--jira-bg);color:#1E6FE0;border:1px solid var(--jira)}
.chip.ss{background:var(--ss-bg);color:#226B43;border:1px solid var(--ss)}
.bar{height:11px;background:var(--bg-surface);border-radius:6px;overflow:hidden;margin-top:5px}.bar>i{display:inline-block;height:100%}
.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--text-muted);margin-top:8px}
.legend span{display:inline-flex;align-items:center;gap:6px}.sw{width:11px;height:11px;border-radius:2px;display:inline-block}
.lb-row{display:flex;align-items:center;gap:11px;padding:7px 5px;border-bottom:1px solid rgba(115,133,160,.4)}
.lb-rank{font-family:Georgia,serif;font-size:17px;color:var(--gold);width:24px;text-align:center}
.lb-name{flex:1;font-weight:600}.lb-bar{flex:2;max-width:320px}.lb-val{font-family:Georgia,serif;font-size:15px;color:var(--cream);width:36px;text-align:right}
.note{font-size:10.5px;color:var(--text-dim);line-height:1.6;margin-top:9px}
.mt{margin-top:13px}.big-rag{font-family:Georgia,serif;font-size:42px;letter-spacing:.07em;line-height:1}
.wkchip{background:var(--bg-surface);border:1px solid var(--border-lt);color:var(--text-muted);padding:5px 12px;border-radius:14px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;letter-spacing:.04em}
.wkchip:hover{border-color:var(--gold)}
.wkchip.wk-active{background:var(--gold);color:#fff;border-color:var(--gold-br)}
.rag-input{display:flex;justify-content:space-between;align-items:center;padding:9px 4px;border-bottom:1px solid rgba(115,133,160,.4);gap:10px}
.mini{font-size:10px;color:var(--text-dim);letter-spacing:.08em;text-transform:uppercase}
.exec{font-size:12.5px;line-height:1.8;color:var(--text-muted)}
.donut-wrap{display:flex;align-items:center;gap:14px}
#loading{padding:40px;text-align:center;color:var(--text-muted)}
.spin{display:inline-block;width:22px;height:22px;border:3px solid var(--bg-surface);border-top-color:var(--gold);border-radius:50%;animation:s 0.9s linear infinite;vertical-align:middle;margin-right:10px}
@keyframes s{to{transform:rotate(360deg)}}
body{font-size:13.5px}
.panel{box-shadow:0 1px 4px rgba(16,35,59,.10)}
th{color:#6B5B3A}
td{color:#16273c}
tr:nth-child(even) td{background:rgba(46,127,196,.06)}
.note{color:#6B5B3A}.kpi-lbl{color:#7385a0}.mini{color:#7385a0}
a{color:#8A6A1E}
nav.tabs{box-shadow:0 1px 3px rgba(16,35,59,.08)}
.src{position:absolute;top:11px;right:12px;font-size:9px;letter-spacing:.05em;text-transform:uppercase;color:#1E6FE0;background:var(--jira-bg);border:1px solid var(--jira);border-radius:10px;padding:2px 8px;font-weight:700;z-index:2}
.src.ss{color:#226B43;background:var(--ss-bg);border-color:var(--ss)}
.src:hover{text-decoration:none;filter:brightness(.93)}
.srcbar{display:inline-flex;gap:7px;flex-wrap:wrap;align-items:center;margin-left:6px}
.srcbar a{font-size:9px;letter-spacing:.05em;text-transform:uppercase;font-weight:700;padding:3px 9px;border-radius:11px}
.srcbar a.j{color:#1E6FE0;background:var(--jira-bg);border:1px solid var(--jira)}
.srcbar a.s{color:#226B43;background:var(--ss-bg);border:1px solid var(--ss)}
.src-inline{font-size:9px;font-weight:700;color:#226B43;border:1px solid var(--ss);background:var(--ss-bg);border-radius:9px;padding:1px 6px;letter-spacing:.04em;white-space:nowrap}
.src-inline.j{color:#1E6FE0;border-color:var(--jira);background:var(--jira-bg)}
.why{display:inline-block;margin-left:7px;font-size:8.5px;font-weight:700;color:#8A6A1E;background:rgba(46,127,196,.12);border:1px solid var(--gold);border-radius:9px;padding:1px 7px;cursor:pointer;letter-spacing:.06em;text-transform:uppercase;vertical-align:middle;white-space:nowrap}
.why:hover{filter:brightness(.94)}
.why::before{content:'ⓘ ';}
.modal{display:none;position:fixed;inset:0;background:rgba(16,35,59,.5);z-index:60;align-items:flex-start;justify-content:center;padding:60px 20px;overflow:auto}
.modal.show{display:flex}
.modal-card{background:var(--bg-panel);border:1px solid var(--gold);border-radius:8px;max-width:600px;width:100%;padding:22px 24px;box-shadow:0 10px 40px rgba(16,35,59,.4);position:relative}
.modal-x{position:absolute;top:10px;right:15px;font-size:24px;color:var(--text-muted);cursor:pointer;line-height:1}
.modal-body h3{font-family:Georgia,serif;color:var(--gold-br);font-size:17px;margin-bottom:4px}
.modal-body .msub{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
.modal-body p{font-size:12.5px;color:var(--text-muted);line-height:1.65;margin:8px 0}
.modal-body .mrow{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-bottom:1px solid var(--border-lt);font-size:12px}
.modal-body .mrow b{color:var(--cream)}
.modal-body .mnote{font-size:11px;color:var(--text-dim);line-height:1.55;margin:2px 0 10px;padding-left:2px}
.bpill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.03em;line-height:1;vertical-align:middle}
.bpill .blbl{display:inline-flex;flex-direction:column;align-items:center;line-height:1;text-align:center}
.bpill .blight{font-size:7px;font-weight:700;letter-spacing:.1em;opacity:.92;margin-bottom:1px}
td .bpill{font-size:10px;padding:2px 8px}
.modal-body .formula{background:var(--bg-surface);border-left:3px solid var(--gold);padding:8px 11px;border-radius:0 4px 4px 0;font-size:12px;color:var(--cream);margin:10px 0;line-height:1.6}
.modebar{padding:6px 20px;font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700;text-align:center;border-bottom:1px solid var(--border-lt)}
.modebar.live{background:rgba(62,113,66,.14);color:var(--good)}
.modebar.snap{background:rgba(46,127,196,.16);color:var(--gold-br)}
.bcard{text-align:center}
.bcard-h{font-family:Georgia,serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:2px}
.bcard-v{font-family:Georgia,serif;font-size:30px;color:var(--cream);line-height:1}
.bcard-verdict{font-size:12px;font-weight:700;letter-spacing:.04em;margin:3px 0 4px;text-transform:uppercase}
.bcard-sub{font-size:10px;color:var(--text-dim);letter-spacing:.03em;margin-top:3px}
.hm{display:inline-flex;flex-direction:column;gap:4px;margin-top:8px}
.hm-row{display:flex;gap:4px;align-items:center}
.hm-cell{width:50px;height:34px;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px}
.hm-axis{width:20px;text-align:center;font-size:10px;color:var(--text-dim);font-weight:700}
.hm-xlab{width:50px;text-align:center;font-size:10px;color:var(--text-dim);font-weight:700}
.hm-axes{font-size:9.5px;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase;margin-top:7px}
.err{color:var(--bad-br);font-size:12px;padding:8px;background:rgba(179,58,27,.1);border:1px solid var(--bad);border-radius:4px;margin-top:8px}
.sowdoc{font-size:12.5px;line-height:1.55;color:var(--text);max-width:960px}
.sowdoc .sowh{font-family:Georgia,serif;font-size:13px;letter-spacing:.05em;color:var(--gold-br);margin:17px 0 6px;text-transform:none;font-weight:600;border-bottom:1px solid var(--border-lt);padding-bottom:3px}
.sowdoc .sowp{margin:7px 0}
.sowdoc .sowd{margin:8px 0;padding:4px 0 4px 11px;border-left:3px solid var(--gold)}
.sowdoc .sowi{margin:6px 0 6px 22px;color:var(--text-muted)}
.sowdoc .sowdid{color:var(--gold-br)}
a.dref{color:var(--gold-br);font-weight:700;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;cursor:pointer}
a.dref:hover{background:rgba(46,127,196,.22);border-radius:3px}
.sowdoc .sowul{margin:5px 0 11px 20px;padding-left:6px}
.sowdoc .sowul li{margin:3px 0}
</style>

<style id="clarkai-theme">
:root{
 --bg-deep:#e4eaf1;--bg-panel:#ffffff;--bg-surface:#d6deea;--border-lt:#c2cede;
 --text:#16273c;--text-muted:#425468;--text-dim:#7385a0;--gold:#2E7FC4;--gold-br:#1c5a94;--cream:#16273c;
 --good:#2E9E6A;--good-s:#26855a;--warn:#C08A2E;--warn-s:#9A6B12;--bad:#C0432A;--bad-br:#A8331A;
 --jira:#2E7FC4;--jira-bg:rgba(46,127,196,0.12);--ss:#3E9EA8;--ss-bg:rgba(62,158,168,0.12);}
html,body{background:linear-gradient(180deg,#e9eef4,#dbe3ee)!important}
header.topbar{background:linear-gradient(135deg,#0e1e33 0%,#1f4a78 60%,#2a5f96 100%)!important;border-bottom:3px solid #9fb4c9;box-shadow:0 2px 10px rgba(16,35,59,.25)}
.brand .logo{height:54px;border-radius:8px;background:#fff;padding:2px;box-shadow:0 1px 6px rgba(0,0,0,.25)}
.title-block .title{color:#ffffff!important;letter-spacing:.02em}
.title-block .sub{color:#bcd0e6!important}
.demoback{display:inline-block;background:linear-gradient(135deg,#2E7FC4,#1c5a94);color:#fff!important;font-weight:700;padding:6px 13px;border-radius:16px;font-size:11px;letter-spacing:.03em;text-decoration:none;border:1px solid #7fb0dd}
.demoback:hover{filter:brightness(1.12);text-decoration:none}
.demotag{display:inline-block;margin-left:10px;font-size:10px;letter-spacing:.14em;color:#bcd0e6;text-transform:uppercase}
nav.tabs{background:#eef3f9;border-bottom:1px solid #c2cede}
nav.tabs button.active{color:#1c5a94!important;border-bottom-color:#2E7FC4!important;background:rgba(46,127,196,.10)!important}
.modebar.snap{background:#0e1e33;color:#bcd0e6;border-bottom:1px solid #2E7FC4}
.panel::before{background:linear-gradient(90deg,#2E7FC4,#9fb4c9)!important;opacity:1}
.kpi,.big-rag{color:#16273c}
.brand .tag{color:#9fc2e6}
</style>
</head>

window.__SOW={p0:"<p class=\"sowp\">This Statement of Work (“SOW”) # 6 is made and entered into as of June ___,  30   2026 by and between Positronic Partners LLC, a Delaware corporation (“Positronic Partners”), with offices at 1901 Positronic Way, New Cybertron CA 90210 and ClarkAI Beverage Co, Inc., a New York corporation (“Client”) with offices at 1 Robot Fuel Plaza, Syracuse, NY 13202. Positronic Partners and Client are sometimes individually referred to as a “party” and collectively as the “parties.” This SOW is subject to the Master Service Agreement (“Agreement”) between the Parties dated December7, 2022.</p>\n<p class=\"sowp\">The purpose of this SOW is for Client and Positronic Partners to mutually agree to the Scope and Out of Scope Items, Effort Estimate, Timeline, Professional Fees, and Agreed Conditions associated with Project Robot Fuel Phase 0 as described below.</p>\n<p class=\"sowp\">ClarkAI may cancel this SOW for any reason and unless services have already been provided there is no financial obligation for any phase after phase 0.</p>\n<h3 class=\"sowh\">1. Phase 0 Commitment and Exit.</h3>\n<p class=\"sowi\">a.      Phase 0 Commitment Only. Phase 0 is the only committed and authorized phase under this SOW. No fee, deposit or charge accrues for any phase after Phase 0 unless and until ClarkAI issues a separate written notice to proceed for that phase.</p>\n<p class=\"sowi\">b.     Exit Without Penalty. ClarkAI may terminate this SOW at any time, before, during or after Phase 0, for any reason or no reason, without penalty, termination fee or wind-down charge of any kind. Upon exit ClarkAI is obligation for only the Phase 0 fee prorated to the work actually performed and accepted up to the exit date, and any deposit, less amounts properly due for that accepted work, is refunded within 30 days.</p>\n<h3 class=\"sowh\">2. Phase 0 Timeline. Phase 0 to be completed no later than July 28, 2026.</h3>\n<h3 class=\"sowh\">3. Phase 0 Scope and Deliverables</h3>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D1\">D1</a>.</b> Current-state assessment, all 9 workstreams. A written assessment across WS0 to WS8 covering functional, technical, AI, change-management and data-readiness findings, the requirements per workstream and any revised level of effort. It must establish, from ClarkAI Oracle data, the current baseline and the staged targets for every outcome and KPI and define, for each KPI, the exact measurement method and data source in ClarkAI Oracle data.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D2\">D2</a>.</b> WS0 Business Case Validation Report and Incentive Proposal. The WS0 deliverables shall be presented to ClarkAI Leadership for acceptance at Stage Gate 1 to include KPIs, outcome metrics, measurement method and governance.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D3\">D3</a>.</b> Oracle Redwood readiness view with gap log. A Redwood feasibility review against ClarkAI requirements, a gap log with a proposed solution per gap, the Oracle release-calendar mapping from 26B to 27A and a Redwood environment plan.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D4\">D4</a>.</b> Integration map and inventory sync configuration analysis (two options). A diagram and inventory of every system with data flowing into or out of Oracle, including the WMS and inventory integrations, with named interface owners. Cyberdyne Systems performs the analysis of the inventory sync configuration and presents two options in this scope. Option 1: maintain the current IHT configuration. Option 2: adopt the Cyberdyne Systems software. Option 2 may incur additional costs in subsequent phases, which Cyberdyne Systems must detail in full as part of this Phase 0 deliverable.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D5\">D5</a>.</b> Cutover, blackout sequencing and phase map. A sequencing document for Phase 0 and future Phases and the Design, Build and Test sub-phases that respects the November and December blackout, plus the single phase-and-workstream map (WS0 to WS8) with the WS2 to WS6 and WS5 to WS7 dependency gates expressed.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D6\">D6</a>.</b> Baseline team plan with named resources. A resource plan by phase showing each role, location and onshore or offshore split with hours per week or month, plus named Phase 1 resources, and the named Cyberdyne Systems personnel for the WMS and inventory integration.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D7\">D7</a>.</b> Risk register. A manufacturing-specific risk register with likelihood, impact, mitigation and a named owner per risk.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D8\">D8</a>.</b> OCM assessment. The OCM assessment will include:</p><ul class=\"sowul\"><li>Change readiness assessment: interviews with key stakeholders to evaluate readiness for upcoming Oracle and AI enhancements.</li><li>Stakeholder mapping: identification of impacted stakeholder groups by Oracle functionality, department, and location.</li><li>OCM project plan outlining key tasks and deliverables by phase/sprint.</li><li>AI governance recommendations, including an approach for scaling governance, defining roles, establishing meeting cadences, and clarifying decision rights and controls.</li><li>OCM assessment presentation summarizing Phase 0 findings and recommended OCM tasks and deliverables by phase</li></ul>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D9\">D9</a>.</b> Quick-wins backlog and Phase 0 inventory-accuracy demonstration. Plan for prioritized backlog of the fast wins for immediate Oracle adoption value that Positronic Partners committed to in its proposal, led by inventory accuracy.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D9a\">D9a</a>.</b> Additional proposed quick wins (Phase 0 scoping). Plan, Scope, plan and prioritize the further quick wins Positronic Partners proposed, as Phase 0 deliverables not tied to any payment. These</p>\n<p class=\"sowp\">quick wins are listed below by workstream. Implementation of each follows only in a later authorized phase. These are not being deployed in Phase 0. (WS1) inventory sync agent Phase 2 and auto-reconciliation pilot on a specific transaction. (WS2) master data cleanup for high-volume, high-exception SKUs and the backflushing standard-versus-custom decision. (WS3) critical reports library of 15 medium-complexity reports with the reporting governance committee plus OTBI, Smartview and FDI training. (WS4) demand management with hypertuning, consolidation of demand signals, a forecast accuracy (MAPE) baseline, candidate planning agents from Oracle's OOTB library with selection confirmed by ClarkAI, capacity planning options including non-enforcing mode as one design choice. (WS7) Redwood migration readiness for the early modules. (WS8) AI 101 training for ten personas, the change champion network, new-product- introduction process streamlining.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D10\">D10</a>.</b> KPI baselines, targets and measurement methodology. Baselines, phased targets and the measurement method for the six RFP KPIs (inventory sync accuracy, forecast MAPE, exception SLA, planner touch time, close cycle time and OTIF), staged per phase, plus the incentive program design and governance for subsequent phases (created in Phase 0, not implemented in Phase 0). Achievement is measured from ClarkAI Oracle data with no vendor self-certification.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D11\">D11</a>.</b> Tooling and governance setup. Configuration of the agreed project tools (Jira and Smartsheet, or Microsoft Azure DevOps Boards, ClarkAI owned and administered), the EVM dashboard and the compendium platform with the AI-coexistence and no-shadow-copy rules. This is ClarkAI owned</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D12\">D12</a>.</b> Stage Gate 1 acceptance package. A consolidated package presenting deliverables <a class=\"dref\" data-d=\"D1\">D1</a> to <a class=\"dref\" data-d=\"D11\">D11</a> for a single ClarkAI Leadership go or no-go decision before any future phase authorization or fee.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D13\">D13</a>.</b> Detailed program plan and agile release plan. A detailed project plan, phase plan and staffing plan, a detailed description of the epics and user stories, and an agile release plan that shows the workstreams, the parallel work and the ClarkAI resources required by role and by timing.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D14\">D14</a>.</b> Security and privilege assessment. A security and privilege assessment covering system and data access, and a detailed design of how privileges are assigned and propagated for AI agents, including least-privilege, segregation-of-duties and human-in-the-loop controls.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D15\">D15</a>.</b> Agent architecture proposal. A detailed AI agent architecture proposal covering agent orchestration, management and governance, with the specific technologies proposed and how they integrate with Oracle and the ClarkAI environment.</p>\n<p class=\"sowd\"><b class=\"sowdid\"><a class=\"dref\" data-d=\"D16\">D16</a>.</b> Workstream HTML prototypes. HTML prototypes for the workstreams that will improve business processes, so ClarkAI can assess the proposed improvements before committing to any later phase.</p>\n<p class=\"sowp\">Timing of Deliverables. All Phase 0 deliverables, including the documents, analysis, prototypes and plans shall be delivered as they are completed by sprint. ClarkAI will receive a lot of content before week 4, but not all of the deliverables.</p>\n<p class=\"sowp\">Acceptance by ClarkAI. Each Phase 0 deliverable is complete only upon written acceptance by an authorized ClarkAI representative. ClarkAI shall have three business days from the date of delivery of the Deliverables to accept, or to reject (with written reasons) any Deliverable. Thereafter, Positronic Partners shall revise and resubmit within five business days. No deliverable shall be deemed accepted by passage of time, by use or by ClarkAI silence.</p>\n<p class=\"sowp\">All of the deliverables will be completed for clients review by July 14th except for the four below:</p>\n<ul class=\"sowul\"><li><a class=\"dref\" data-d=\"D4\">D4</a>: Integration Map and Inventory Sync Configuration Analysis</li><li><a class=\"dref\" data-d=\"D8\">D8</a>: OCM Assessment</li><li><a class=\"dref\" data-d=\"D9\">D9</a>: Quick-Wins Backlog and Inventory Accuracy Demonstration</li><li><a class=\"dref\" data-d=\"D13\">D13</a>: Detailed High Level Program Plan and Agile Release Plan</li></ul>\n<p class=\"sowp\">These 4 will be delivered prior to the end of week 6 by July 24th.</p>\n<h3 class=\"sowh\">4. Phase 0 Fees.</h3>\n<p class=\"sowi\">a.     Maximum Fee. The maximum fee for all Phase 0 deliverables as set forth above shall be $300,000.00. No hypercare is included in Phase 0.</p>\n<p class=\"sowi\">b.      Phase 0 Deposit. Based on the maximum Phase 0 fee of $300,000, the Phase 0 deposit is $60,000. If the agreed Phase 0 fee is lower after proration, the deposit is 20% of such lower amount. The deposit shall be credited against Phase 0 invoices and any unapplied balance shall be refunded upon termination or completion.</p>\n<p class=\"sowi\">c.      Billing Transparency and Cadence. All billing under this SOW shall be on a semi- monthly basis. Each invoice must itemize by workstream and the staff time recorded.</p>\n<p class=\"sowp\">IN WITNESS WHEREOF, the parties have caused this SOW to be executed by their duly authorized representatives as identified below.</p>\n<p class=\"sowp\">ClarkAI Beverage Co, Inc.                                              Positronic Partners LLC</p>\n<p class=\"sowp\">Name: Thomas Chartrand                                         Name: David Binkley Title: CFO                                                     Title: CEO Date: 6/30/2026                                                Date: 6/30/2026</p>",p1:"<p class=\"sowp\">This Statement of Work (“SOW”) # 6 is made and entered into as of ________ __, 20__ by and between Positronic Partners LLC, a Delaware corporation (“Positronic Partners”), with offices at 1901 Positronic Way, New Cybertron CA 90210 and ClarkAI Beverage Co, Inc., a New York corporation (“Client”) with offices at 1 Robot Fuel Plaza, Syracuse, NY 13202. Positronic Partners and Client are sometimes individually referred to as a “party” and collectively as the “parties.” This SOW is subject to the Master Service Agreement (“Agreement”) between the Parties dated December7, 2022. This SOW includes Amendment No. 1 to the Agreement, set out in full in Appendix A at the end of this document and executed with this SOW. Where this SOW or Appendix A conflicts with the Agreement, this SOW and Appendix A control over the Agreement.</p>\n<p class=\"sowp\">The purpose of this SOW is for Client and Positronic Partners to mutually agree to the Scope and Out of Scope Items, Effort Estimate, Timeline, Professional Fees, and Agreed Conditions described below.</p>\n<h3 class=\"sowh\">Phase 1: 7 Month Timeline</h3><ul class=\"sowul\"><li>Includes the following workstreams:</li><li>WS1: WMS and ERP integration remediation</li><li>WS3: Reporting and NLQ (natural-language query, with natural language query as Oracle allows)</li><li>WS4: Demand and Supply Planning enhancements (Design Only)</li><li>WS5: Financial Cycle Improvements: Financial agents</li><li>WS7: Redwood migration for Procurement, Inventory, Order Management, Supply and Demand Planning (Supply Planning may slip into Phase 2 due to bugs in 26B limitations)</li><li>WS6: Splyglass POC</li><li>WS8: AI Governance and Training Scope</li><li>WS1: WMS and ERP Sync – This will cover both the integration remediation as well as the Agent enhancements</li><li>Integration</li><li>The integration scope will consist of an overall review of the functional requirements and design, the technical requirements and design as well as code review.</li><li>The Deliverable for this piece is a document outlining the findings of the assessment and the recommended solution</li><li>After alignment on the recommended solution, Positronic Partners will then make the required functional and technical changes and ensure proper testing is performed by both Positronic Partners and Client to adequately test the integrations to ensure the changes have resolved the inventory mis match issue.</li><li>Agent</li><li>Positronic Partners will design Phase 2 of the ERP/WMS reconciliation agent to include workflow auto-correction and human in the loop. It will also include auto-reconciliation integration for a specific transaction</li><li>WS1: Deliverables</li><li>Integration: The deliverable is updated configurations and integration code as agreed upon to resolve the integration issues between ERP Inventory and WMS</li><li>Agent: Design document detailing the requirements as agreed to with Client, and an agent in production executing the required functionality as per design</li><li>WS3: Reporting</li><li>Positronic Partners will perform OTBI/Smarview/FDI training for Client teams (1 session per tool for 90 minutes)</li><li>Launch Reporting governance committee</li><li>Positronic Partners will work with Client to develop a reports library to be developed. 15 reports of medium/high complexity is included.</li><li>Positronic Partners will conduct design sessions for in scope reports</li><li>Positronic Partners will provide functional and technical design documents for in scope reports</li><li>Positronic Partners will code the reports per the specifications</li><li>WS3 Deliverables include:</li><li>Reports library with estimates</li><li>Functional and Technical design documents</li><li>WS4: Demand and Supply Planning Enhancements with AI (Design Only for this Phase)</li><li>Positronic Partners will review the Client requirements and standard functionality within Oracle and provide a document outlining recommended enhancements across the application functionality and AI, as well as for training/OCM for the users to increase adoption</li><li>Positronic Partners will perform discovery around:</li><li>Consolidate demand signals,</li><li>customer forecast</li><li>shipment history</li><li>sales history</li><li>Demand accuracy baseline and live tracking</li><li>Expanded Line Coverage</li><li>WS5: Financial Cycle Improvements</li><li>Positronic Partners will configure and deploy Oracle’s standard suite of native, AI-driven ERP Financial Agents. The agents in scope are: Cash Processing agent, Ledger agent, Payables agent, Payments agent, and Expenses agent.</li><li>WS7: Redwood Migration (Product bugs in 26B may limit Supply Planning deployment)</li><li>Modules in scope: Inventory, Procurement, Supply and Demand Planning, Product Data Hub, Order Management, Manufacturing</li><li>Positronic Partners will review and document the impact analysis by module and any changes needed for Redwood</li><li>Positronic Partners will migrate personalizations using VB Studio as well as unit test</li><li>Positronic Partners will conduct core team training for in scope Redwood pages</li><li>Positronic Partners will assist with Client SIT and UAT testing and remediate issues as they come up. Testing is the responsibility of Client</li><li>Positronic Partners will assist as required with End User Training, which is the responsibility of Client</li><li>Positronic Partners will migrate the configuration and code changes into production</li><li>WS7 Deliverables include:</li><li>Impact analysis document for Redwood</li><li>Migrated Personalizations and updated technical design documentation</li><li>WS8:AI Governance, Training and Change Management</li><li>Form Change Management Team</li><li>Create Change Management plan that aligns with the sprints</li><li>Conduct readiness assessments with a sample of stakeholders</li><li>Create training needs and development tracker</li><li>Plan and develop content for AI 101 training</li><li>Roll out AI 101 Training for Ten (10) personas</li><li>Create content for Redwood enhancements training</li><li>Help establish Change champion network (Change Champions will be led primarily by the client)</li><li>Plan and coordinate role based training workshops</li><li>Propose and establish adoption metrics baseline tracking</li><li>WS8 Deliverables Include:</li><li>Change management project plan</li><li>Readiness assessment readout</li><li>Training needs and development tracker</li><li>Training content for AI 101 training and Redwood enhancements (up to 60 SOPs or training documents)</li><li>Adoption Metrics document</li><li>WS6: Robot Fuel Production Dashboards</li><li>Robot Fuel Proof of Concept (POC): Build a working POC for the Robot Fuel single point-of-truth dashboard, focused on a small set of high-value production metrics identified during discovery.</li><li>The POC will demonstrate an initial view of the dashboard concept, scoped to a limited set of use cases and personas rather than the full workstream rollout.</li><li>The goal is a trustworthy, single-source communication vehicle that gets stakeholders working from the same data, establishing the foundation that later phases will expand with deeper detail and an AI insight layer.</li></ul>\n<h3 class=\"sowh\">Phase 2: 6 Month Timeline</h3><ul class=\"sowul\"><li>Includes the following workstreams</li><li>WS2: Master Data for Production</li><li>WS4: Demand and Supply Planning</li><li>WS5: Financial Cycle Improvements</li><li>WS6: Robot Fuel Production Dashboards</li><li>WS7: Redwood migration (Supply Chain Planning Only) Scope</li><li>WS2: Master Data for Production</li><li>Positronic Partners will review the business requirements to optimize to implement the complete manufacturing operation in Oracle. This will help Client identify constraints impacting OTIF. Positronic Partners will then identify the data that needs to be setup and captured within Oracle to optimize the supply planning module</li><li>This will include item attribute changes and restructuring work definitions, formulas, constraints</li><li>Positronic Partners will then load the data into the Oracle application and assist Client with testing</li><li>WS2 Deliverables</li><li>Document that outlines the data to be identified and created by Client</li><li>Design Documentation updates as required</li><li>Data loaded into Oracle if mass update required</li><li>WS4: Demand and Supply Planning Enhancements with AI</li><li>Positronic Partners will configure and support testing for the agreed upon enhancements in functionality and AI. Testing is the responsibility of Client</li><li>AI Enhancements include Order Release and Exception Advisor</li><li>Hypertuning will be implemented</li><li>Design and Implement Capacity planning non-enforcing mode</li><li>POC of resource based capacity planning</li><li>WS4: Deliverables Include:</li><li>Document outlining enhancements for Demand and Supply Planning</li><li>Design Documentation for new modules and enhancements</li><li>WS7: Supply Planning Redwood Go Live</li><li>Rollout for March/April window of Redwood depending on product functionality</li><li>WS4 Deliverables:</li><li>No documented deliverables</li><li>WS5: Financial Cycle Improvements</li><li>Financial Cycle improvements:</li><li>Automate manual cash matching pipelines and establish systemic costing interfaces</li><li>Implement Cost Processes agent</li><li>WS5 Deliverables:</li><li>Deploy Oracle Cash Management Auto-Reconciliation</li><li>Configure continuous cost processing via the scheduled Cost Processes agent</li><li>Deploy SLA Suspense Accounting and centralized exception triage.</li><li>Document outlining close improvement enhancements and related design document updates as changes agreed upon</li><li>WS6: Robot Fuel Production Dashboards</li><li>Robot Fuel agent decomposition and design</li><li>Planning and Finance Dashboard</li><li>Build Agentic app and deploy</li><li>WS6 Deliverables</li><li>Robot Fuel design document</li><li>WS7: Change Management and Training</li><li>Create Change Management plan that aligns with the sprints</li><li>Conduct readiness assessments with a sample of stakeholders</li><li>Create training needs and development tracker</li><li>Create training content</li><li>Help establish Change champion network (Change Champions will be led primarily by the client)</li><li>Plan and coordinate role based training workshops</li><li>Propose and establish adoption metrics baseline tracking</li><li>WS7 Deliverables Include:</li><li>Change management project plan</li><li>Readiness assessment readout</li><li>Training needs and development tracker</li><li>Training content (up to 60 SOPs or training documents)</li><li>Adoption Metrics document</li></ul>\n<h3 class=\"sowh\">Phase 3: 3 Month Timeline</h3><ul class=\"sowul\"><li>Includes the following</li><li>Advanced Automation</li><li>AI Governance Office</li><li>Builder Certifications</li><li>Robot Fuel Deploy</li><li>Handoff</li></ul>\n<h3 class=\"sowh\">Scope</h3><ul class=\"sowul\"><li>Advanced Automation</li><li>Explore and deploy three (3) Oracle’s Agentic applications</li><li>AI Governance Office</li><li>Positronic Partners will finalize the AI Governance Office structure and team roster as a deliverable and lead two meetings before passing over to ClarkAI</li><li>Builder Certifications</li><li>Recommend certifications helpful for key Client personnel</li><li>Robot Fuel Deploy</li><li>Robot Fuel will be deployed and Positronic Partners will provide support as required for 2 Months</li><li>Handoff</li><li>Positronic Partners will hand off the solution to Client, and answer questions as required with Client leading the solution at this point</li><li>Change Management</li><li>Positronic Partners will conduct the final readiness assessments</li><li>Positronic Partners will collect and publish the final adoption metrics</li></ul>\n<p class=\"sowp\">Hypercare</p><ul class=\"sowul\"><li>Hypercare is included at 3 months per phase and limited to the following amount of hours per phase</li><li>Phase 1: 334 hours</li><li>Phase 2: 497 hours</li><li>Phase 3: 160 hours</li></ul>\n<p class=\"sowp\">SOW Specific Agreements</p><ul class=\"sowul\"><li>ClarkAI has a blackout calendar of November and December where they will have minimal (but some) time to work on the project. The project plan will reflect this</li><li>Positronic Partners will leverage Cyberdyne Systems for the WMS and Inventory integration work</li><li>Vision will be the Project Manager and is confirmed for the life of the project provided she continuous employment with Positronic Partners and does not have a significant promotion and shall remain assigned for the life of the program. ClarkAI confirmed Vision after exercising its right to refuse the previously named PM</li><li>Jira or Microsoft Azure DevOps Boards and Smartsheets will be used as the main project management tools. Both tools will be ClarkAI owned and administered.</li><li>EVM data will be provided by Positronic Partners and reports produced by the Client</li><li>As Client defines their compendium, Positronic Partners will define the required AI tool integration as needed and supporting processes</li><li>Incentive Program: Positronic Partners and Client agree to a program that involves incentives and penalties based on KPI’s that are important to ClarkAI. The KPI’s that will be tracked are: OTIF / Inventory Accuracy / Forecast MAPE / Close Cycle Time / Planner Touch Time / Exception SLA. The way in which these will be measured will be defined in Phase 0. The plan is outlined below This incentive and reduction program, the 20% bonus and 10% reduction structure described below, is the intended structure for the phases after Phase 0. During Phase 0 the parties create the KPIs, outcome metrics, measurement method and governance for the program. It is not part of the Phase 0 payment setup and is not implemented during Phase 0. It takes effect only if ClarkAI authorizes a subsequent phase and adopts the program in writing. Achievement will be measured by ClarkAI from ClarkAI's own Oracle data with no vendor self-certification, on a sustained 30-day basis, with partial payment for partial achievement.</li><li>20% Bonus payment as KPI’s are achieved by Phase. This assumes the KPI’s listed above, and the penalty and bonus are equally distributed across all KPI’s. If 4 are hit, and 2 are missed, this would mean that the 20% bonus is applicable to 66% (4/6) of the KPI’s. Should the fees for that phase $1M, then the calculation would be:</li><li>$1M * 20% * 66% = $132,000 bonus</li><li>10% penalty as KPI’s are not achieved. This assumes the KPI’s listed above , and the penalty and bonus are equally distributed across all KPI’s. If 4 are hit, and 2 are missed, this would mean that the 10% penalty is applicable to 33% (2/6) of the KPI’s. Should the fees for that phase $1M, then the calculation would be:</li><li>$1M * 10% * 33% = $33,000 penalty</li><li>This would then net out to a $99,000 bonus to Positronic Partners</li><li>India resources shall work 3AM to 11AM EST time. US Based resources shall work 8:30-5:30 EST providing 2.5 hours of overlap per day. Out of Scope Items</li><li>Anything not listed as in scope will be out of scope</li></ul>\n<p class=\"sowp\">Professional Fees ClarkAI will have the ability to cancel at any point of this project.  The Services described in this SOW are provided on a fixed basis in accordance with the schedule below set forth herein and terms of the SOW. Any work outside the scope of this SOW shall be set forth in a separate SOW or a Project Change Notice (PCN). The estimated Fees for this SOW plus applicable taxes and actual expenses, is listed in the table below. Professional Services Fees Months Monthly Amount Total Amount (USD) Months 1-3 Aug – Oct ‘26 $325,000 $975,000 Months 4-6 Nov ’26-Jan’27 $250,000 $750,000 Months 7-12 Feb  – Jul ‘27 $200,000 $1,200,000 Months 13-16 Aug – Nov ‘ 27 $100,000 $400,000 Discount</p>\n<p class=\"sowp\">-$25,000 TOTAL</p>\n<p class=\"sowp\">$3,300,000 Agreed Conditions</p><ul class=\"sowul\"><li>Travel expenses are not included in the Professional Fees and will be billed for actual charges incurred as detailed in the Agreement.</li><li>Refer to the Agreement for all other terms and conditions.</li><li>Invoices will be sent monthly per the schedule listed above</li></ul>\n<p class=\"sowp\">ClarkAI Required Terms (added by redline) Stage gates and acceptance. Phase 0 deliverables must be accepted by ClarkAI Leadership at Stage Gate 1 before Phase 1 begins. Each later phase requires written ClarkAI authorization. Each deliverable is subject to ClarkAI acceptance with a defined review window and cure period. Staffing protections. ClarkAI may refuse or require replacement of any individual at any time, no reason required. A qualified replacement is named within 10 business days and ramped within 20, at no price impact and no schedule slip. Every billed individual clears ClarkAI background and security checks. Subcontractor flow-down. All terms of this SOW and the Agreement, including confidentiality, IP assignment to ClarkAI, data security and background checks, flow down to Cyberdyne Systems and any subcontractor. Positronic Partners is fully responsible for its subcontractors. Cyberdyne Systems subcontractor (detailed). Positronic Partners intends to subcontract Cyberdyne Systems for the WMS and inventory-sync integration work, which is part of the inventory-accuracy quick win, so Cyberdyne Systems performance directly affects ClarkAI's headline near-term metric. The following apply. (a) Positronic Partners is solely responsible for all payments to Cyberdyne Systems. ClarkAI has no payment obligation or liability to Cyberdyne Systems, and Cyberdyne Systems waives any claim or lien against ClarkAI. (b) Before Cyberdyne Systems accesses any ClarkAI system or data, Cyberdyne Systems must sign a written agreement binding it directly to the confidentiality, IP assignment to ClarkAI, data-security, no-ClarkAI-data-training and background-check terms of this SOW and the Agreement. (c) Cyberdyne Systems work must meet the same quality, warranty and service-level standards as Positronic Partners work, and Positronic Partners is fully liable for Cyberdyne Systems acts and omissions. (d) Cyberdyne Systems hours and work must be itemized by workstream  in every semi-monthly invoice.   (e) ClarkAI may refuse or require replacement of any Cyberdyne Systems individual on the same terms as Positronic Partners staff, and Cyberdyne Systems must transfer knowledge to ClarkAI IT (Tom Conklin) as a condition of its work. (f) As a condition precedent to signing this Phase 0 SOW, Confirmed scope and sequencing. WS7 includes activation of Redwood embedded AI features. WS8 includes a Redwood embedded-AI training track and a user-story validation track, distinct from AI 101. WS5 begins only after WS7 Redwood migration of Inventory, Procurement and Manufacturing is complete. IN WITNESS WHEREOF, the parties have caused this SOW to be executed by their duly authorized representatives as identified below.</p>\n<p class=\"sowp\">ClarkAI Beverage Co, Inc.</p>\n<p class=\"sowp\">Positronic Partners LLC</p>\n<p class=\"sowp\">Name:</p>\n<p class=\"sowp\">Name: Title:</p>\n<p class=\"sowp\">Title: Date:</p>\n<p class=\"sowp\">Date:</p>\n<h3 class=\"sowh\">Appendix A. Amendment No. 1 to the Master Service Agreement (this Appendix overrides the MSA) This Appendix A is Amendment No. 1 to the Master Service Agreement dated December 7, 2022 between ClarkAI Beverage Co, Inc. (Client) and Positronic Partners Consulting, Inc. (Positronic Partners). It is part of this SOW and is executed with it. Where this Amendment conflicts with the Agreement, this Amendment controls over the Agreement. Capitalized terms not defined here have the meanings given in the Agreement.</h3>\n<h3 class=\"sowh\">4. Deposit (amends Section 9). Any deposit under Section 9 is calculated only on the fees for the phase or phases of this SOW that Client has authorized in writing.  The deposit will be 5% of those fees, so for this SOW the deposit will be $3,325,000 * 5% = $166,250.   As such, the deposit for this SOW is $166,250</h3>\n<h3 class=\"sowh\">6. Insurance (amends Section 15). In addition to the coverages required by Section 15, Positronic Partners shall maintain cyber liability insurance of not less than $5,000,000 per occurrence and Errors and Omissions (professional liability) insurance of not less than $5,000,000 per occurrence, each naming Client as an additional insured.</h3>\n<h3 class=\"sowh\">7. Termination wind-down (amends Section 14). On a termination by Client for convenience, the unavoidable non-cancellable commitments reimbursable under Section 14 must be documented and approved by Client in advance and shall not exceed one month of fees. This is consistent with the penalty-free Phase 0 exit stated earlier in this SOW.</h3>\n<h3 class=\"sowh\">8. No other changes. Except as expressly amended here, the Agreement remains in full force and effect. IN WITNESS WHEREOF, the parties have executed this Amendment as part of and concurrently with this SOW. ClarkAI Beverage Co, Inc. By: ______________________________    Name: ____________________________    Title: ____________________    Date: ____________ Positronic Partners Consulting, Inc. By: ______________________________    Name: ____________________________    Title: ____________________    Date: ____________</h3>"};
